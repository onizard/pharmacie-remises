name: Explorer Espace Client Digipharmacie

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Supabase user ID'
        required: true

jobs:
  explore:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Installer dépendances Python
        run: pip3 install --quiet camoufox curl_cffi

      - name: Télécharger camoufox browser
        run: python3 -m camoufox fetch

      - name: Patch Playwright (null-check pageError.location)
        run: |
          BUNDLE=$(python3 -c "import os,playwright; print(os.path.join(os.path.dirname(playwright.__file__),'driver/package/lib/coreBundle.js'))")
          sed -i "s/pageError\.location\.url/pageError.location?.url||''/g" "$BUNDLE"
          sed -i "s/pageError\.location\.lineNumber/pageError.location?.lineNumber||0/g" "$BUNDLE"
          sed -i "s/pageError\.location\.columnNumber/pageError.location?.columnNumber||0/g" "$BUNDLE"

      - name: Explorer Achats > Espaces clients
        env:
          USER_ID:              ${{ inputs.user_id }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PROXY_URL:            ${{ secrets.PROXY_URL }}
        run: python3 api_scraper/explore_espace_client.py
