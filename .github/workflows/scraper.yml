name: Scraper DIGIPHARMACIE

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Supabase user ID'
        required: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache camoufox Firefox binary
        uses: actions/cache@v4
        with:
          path: ~/.local/share/camoufox
          key: camoufox-${{ runner.os }}-v1

      - name: Install dependencies
        run: |
          pip install --quiet camoufox[geoip] pdfplumber
          python -m camoufox fetch

      - name: Run scraper
        env:
          USER_ID: ${{ inputs.user_id }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python api_scraper/run_job.py
