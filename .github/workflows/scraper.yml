name: Scraper DIGIPHARMACIE

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Supabase user ID'
        required: true
      labs_filter:
        description: 'Filtre labo (ex: biogaran). Vide = tous les génériques.'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        # playwright épinglé à 1.60.0 : la 1.61.0 (29/06/2026) envoie viewport.isMobile
        # au backend Firefox de camoufox qui le rejette → crash new_context/new_page.
        run: pip3 install --quiet camoufox "playwright==1.60.0" curl_cffi pdfplumber

      - name: Fetch camoufox browser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # auth API GitHub (sinon 60 req/h → 403 rate limit)
        run: python3 -m camoufox fetch || true  # binaries déjà présents sur self-hosted ; MMDB geoip non requis

      - name: Patch Playwright (null-check pageError.location)
        run: |
          BUNDLE=$(python3 -c "import os,playwright; print(os.path.join(os.path.dirname(playwright.__file__),'driver/package/lib/coreBundle.js'))")
          TMP=$(mktemp)
          cp "$BUNDLE" "$TMP"
          sed -i "s/pageError\.location\.url/pageError.location?.url||''/g" "$TMP"
          sed -i "s/pageError\.location\.lineNumber/pageError.location?.lineNumber||0/g" "$TMP"
          sed -i "s/pageError\.location\.columnNumber/pageError.location?.columnNumber||0/g" "$TMP"
          sudo cp "$TMP" "$BUNDLE" && echo "Patched OK" || echo "Patch skipped (permissions)"
          rm -f "$TMP"

      - name: Run scraper
        env:
          USER_ID:              ${{ inputs.user_id }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PROXY_URL:            ${{ secrets.PROXY_URL }}
          LABS_FILTER:          ${{ inputs.labs_filter }}
          PDF_DEBUG:            "0"
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}   # AsyncCamoufox vérifie la version via l'API GitHub au lancement
        run: python3 api_scraper/run_job.py
