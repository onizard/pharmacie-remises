name: Scraper DIGIPHARMACIE

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Supabase user ID'
        required: true

jobs:
  scrape:
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Run scraper
        env:
          USER_ID: ${{ inputs.user_id }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 api_scraper/run_job.py
