name: Test Connecteur

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Supabase user ID'
        required: true
      connector:
        description: 'ospharm or digipharmacie'
        required: true

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Test connexion
        env:
          USER_ID:              ${{ inputs.user_id }}
          CONNECTOR:            ${{ inputs.connector }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 api_scraper/test_connector.py
