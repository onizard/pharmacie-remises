name: Test Connecteur

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Supabase user ID'
        required: true
      connector:
        description: 'ospharm or digipharmacie'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install curl_cffi
        run: pip install --quiet curl_cffi

      - name: Test connexion
        env:
          USER_ID:              ${{ inputs.user_id }}
          CONNECTOR:            ${{ inputs.connector }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 api_scraper/test_connector.py
