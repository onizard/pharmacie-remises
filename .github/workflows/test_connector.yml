name: Test Connecteur

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Supabase user ID'
        required: true
      connector:
        description: 'ospharm or digipharmacie'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip3 install --quiet camoufox curl_cffi

      - name: Fetch camoufox browser
        run: python3 -m camoufox fetch

      - name: Patch Playwright (null-check pageError.location)
        run: |
          BUNDLE=$(python3 -c "import os,playwright; print(os.path.join(os.path.dirname(playwright.__file__),'driver/package/lib/coreBundle.js'))")
          sed -i 's/pageError\.location\.url/(pageError.location||{}).url/g' "$BUNDLE" && echo "Patched OK" || echo "Patch skipped"

      - name: Test connexion
        env:
          USER_ID:              ${{ inputs.user_id }}
          CONNECTOR:            ${{ inputs.connector }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PROXY_URL:            ${{ secrets.PROXY_URL }}
        run: python3 api_scraper/test_connector.py
