name: Test Connecteur

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Supabase user ID'
        required: true
      connector:
        description: 'ospharm or digipharmacie'
        required: true

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip3 install --quiet camoufox curl_cffi

      - name: Fetch camoufox browser
        run: python3 -m camoufox fetch 2>&1 || true

      - name: Test connexion
        env:
          USER_ID:              ${{ inputs.user_id }}
          CONNECTOR:            ${{ inputs.connector }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PROXY_URL:            ${{ secrets.PROXY_URL }}
        run: python3 api_scraper/test_connector.py
